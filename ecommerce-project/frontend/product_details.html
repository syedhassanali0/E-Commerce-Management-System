<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEase — Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="nav"></div>

  <main class="container section">
    <a href="products.html" class="muted">← Back to products</a>
    <div id="msg" class="mt"></div>
    <div id="detail" class="mt"></div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 ShopEase — OSSD Final Semester Project</div>
  </footer>

  <script src="app.js"></script>
  <script>
    renderNav("products");

    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");

    async function loadProduct() {
      const box = document.getElementById("detail");
      if (!productId) { box.innerHTML = '<p class="empty">No product selected.</p>'; return; }
      try {
        const p = await api("/products/" + productId);
        box.innerHTML = `
          <div class="card" style="display:flex;gap:30px;flex-wrap:wrap;align-items:center">
            <div class="product-thumb" style="width:220px;height:220px;border-radius:12px;font-size:4rem">${productIcon()}</div>
            <div style="flex:1;min-width:240px">
              <h2>${p.name}</h2>
              <p class="price" style="color:var(--emerald);font-size:1.6rem;font-weight:700;font-family:'Space Grotesk'">${money(p.price)}</p>
              <p class="muted mt">${p.description || "No description provided."}</p>
              <p class="mt"><span class="tag">${p.stock > 0 ? p.stock + " in stock" : "Out of stock"}</span></p>
              <div class="row mt" style="align-items:flex-end;max-width:320px">
                <div class="field" style="max-width:110px">
                  <label>Quantity</label>
                  <input type="number" id="qty" value="1" min="1" max="${p.stock}" />
                </div>
                <button class="btn amber" style="margin-bottom:16px" ${p.stock<=0?"disabled":""} onclick="addToCart(${p.id})">Add to cart</button>
              </div>
            </div>
          </div>`;
      } catch (e) {
        box.innerHTML = `<p class="empty">${e.message}</p>`;
      }
    }

    async function addToCart(id) {
      if (!requireLogin()) return;
      const qty = parseInt(document.getElementById("qty").value) || 1;
      const user = getUser();
      try {
        await api("/cart", { method: "POST", body: { user_id: user.id, product_id: id, quantity: qty } });
        document.getElementById("msg").innerHTML = '<div class="alert ok">Added to cart. <a href="cart.html">Go to cart</a></div>';
      } catch (e) {
        document.getElementById("msg").innerHTML = `<div class="alert error">${e.message}</div>`;
      }
    }

    loadProduct();
  </script>
</body>
</html>
